<div class="admin-container">
  <h2>Alta de Galería (Carpeta)</h2>
  <form class="admin-form" (ngSubmit)="onSubmitGalery()">
    
    <label for="title">Título</label>
    <input id="title" name="title" type="text" [(ngModel)]="titleGallery" />

    <button type="submit" [disabled]="!titleGallery || titleGallery.trim() === ''">Crear Carpeta</button>
  </form>

  <hr style="margin: 40px 0; border: 1px solid #eee;" />

  <h2>Carpetas Existentes</h2>
  <div class="galleries-list" *ngIf="galleries().length > 0; else noGalleries">
    <div class="gallery-card" *ngFor="let gallery of galleries()">
      <div class="card-header">
        <h3>{{ gallery.title }}</h3>
        <button class="delete-gallery-btn" (click)="deleteGallery(gallery.id)" title="Eliminar galería">&times;</button>
      </div>
      <button class="manage-btn" [routerLink]="['/admin/gallery', gallery.id]">Gestionar Imágenes</button>
    </div>
  </div>

  <ng-template #noGalleries>
    <p>No hay galerías creadas. Crea una usando el formulario de arriba.</p>
  </ng-template>
  
</div>
