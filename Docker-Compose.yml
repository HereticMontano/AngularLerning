services:
  api:    
    build:
      context: .
      dockerfile: AngularApp1.Server/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"

  web:    
    build:
      context: angularapp1.client/
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4200:80"

  db:
    image: mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: "admin"
      MONGO_INITDB_ROOT_PASSWORD: "my_password"        
    volumes: 
      - "mongo_data:/data/db"
            
volumes:
  mongo_data: